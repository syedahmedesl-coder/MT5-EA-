<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-generator">
            <div class="header">
                <h1>😂 Joke Generator</h1>
                <p>Get a random laugh with just one click!</p>
            </div>

            <div class="joke-display" id="jokeDisplay">
                <p class="loading-text">Click the button to get a joke!</p>
            </div>

            <div class="controls">
                <button id="getJokeBtn" class="btn btn-primary">Get a Joke</button>
                <button id="shareBtn" class="btn btn-secondary" disabled>Share</button>
                <button id="copyBtn" class="btn btn-secondary" disabled>Copy</button>
            </div>

            <div class="joke-type-selector">
                <label for="jokeType">Joke Type:</label>
                <select id="jokeType">
                    <option value="any">Any Type</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>

            <div class="joke-history">
                <h3>Recent Jokes</h3>
                <ul id="jokeHistory" class="history-list">
                    <li class="empty-message">No jokes yet. Get started!</li>
                </ul>
                <button id="clearHistoryBtn" class="btn btn-small" disabled>Clear History</button>
            </div>

            <div class="status" id="status"></div>
        </div>
    </div>

    <script src="joke-script.js"></script>
</body>
</html>
